<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body><h1>Edit Post</h1>
<form action="{{ url_for('update', post_id=post['id']) }}" method="POST"><label for="author">Author</label> <input
        type="text" id="author" name="author" value="{{ post['author'] }}" required> <label for="title">Title</label>
    <input type="text" id="title" name="title" value="{{ post['title'] }}" required> <label
            for="content">Content</label> <textarea id="content" name="content"
                                                    required>{{ post['content'] }}</textarea>
    <button type="submit">Save</button>
</form>
<a href="{{ url_for('index') }}">Back to Home</a></body>
</html>
